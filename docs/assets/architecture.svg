<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="Inter, Helvetica, system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b9cb3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="340" fill="#0a0e14" rx="0"/>

  <!-- === HM3D INPUT === -->
  <rect x="20" y="130" width="100" height="80" rx="4" fill="#131820" stroke="#2a3340" stroke-width="1"/>
  <text x="70" y="162" text-anchor="middle" fill="#b0bec5" font-size="10" font-weight="600">HM3D Scene</text>
  <text x="70" y="178" text-anchor="middle" fill="#546e7a" font-size="8">00800-TEEsavR23oF</text>
  <text x="70" y="192" text-anchor="middle" fill="#37474f" font-size="7">398 m² · 7 rooms</text>
  <text x="70" y="204" text-anchor="middle" fill="#37474f" font-size="7">GLB + navmesh</text>

  <!-- Arrow input → s1 -->
  <line x1="120" y1="170" x2="158" y2="170" stroke="#455a64" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- === STAGE 1: Trajectory === -->
  <rect x="160" y="110" width="180" height="120" rx="4" fill="#111922" stroke="#1b3a4a" stroke-width="1"/>
  <!-- Stage label bar -->
  <rect x="160" y="110" width="180" height="22" rx="4" fill="#152535"/>
  <rect x="160" y="128" width="180" height="4" fill="#152535"/>
  <text x="250" y="125" text-anchor="middle" fill="#4fc3f7" font-size="8" font-weight="700" letter-spacing="1">STAGE 1</text>

  <text x="250" y="152" text-anchor="middle" fill="#e0e0e0" font-size="10" font-weight="600">Trajectory Collection</text>
  <text x="250" y="170" text-anchor="middle" fill="#78909c" font-size="8">habitat‑sim 0.3.3</text>
  <text x="250" y="186" text-anchor="middle" fill="#546e7a" font-size="7">Navmesh waypoints · 1.5m eye height</text>
  <text x="250" y="200" text-anchor="middle" fill="#546e7a" font-size="7">640×480 RGB · 90° HFOV</text>
  <text x="250" y="218" text-anchor="middle" fill="#4fc3f7" font-size="7">→ 26 JPEG frames + metadata</text>

  <!-- Arrow s1 → s2 -->
  <line x1="340" y1="170" x2="378" y2="170" stroke="#455a64" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="359" y="163" text-anchor="middle" fill="#546e7a" font-size="6">JPEG</text>

  <!-- === STAGE 2: Detection === -->
  <rect x="380" y="110" width="180" height="120" rx="4" fill="#111922" stroke="#1b3a2a" stroke-width="1"/>
  <rect x="380" y="110" width="180" height="22" rx="4" fill="#152520"/>
  <rect x="380" y="128" width="180" height="4" fill="#152520"/>
  <text x="470" y="125" text-anchor="middle" fill="#81c784" font-size="8" font-weight="700" letter-spacing="1">STAGE 2</text>

  <text x="470" y="152" text-anchor="middle" fill="#e0e0e0" font-size="10" font-weight="600">Object Detection</text>
  <text x="470" y="170" text-anchor="middle" fill="#78909c" font-size="8">YOLO‑World v2</text>
  <text x="470" y="186" text-anchor="middle" fill="#546e7a" font-size="7">Open‑vocabulary · 41 classes</text>
  <text x="470" y="200" text-anchor="middle" fill="#546e7a" font-size="7">CLIP text encoder · zero‑shot</text>
  <text x="470" y="218" text-anchor="middle" fill="#81c784" font-size="7">→ 340 detections · 31 classes</text>

  <!-- Arrow s2 → s3 -->
  <line x1="560" y1="170" x2="598" y2="170" stroke="#455a64" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="579" y="163" text-anchor="middle" fill="#546e7a" font-size="6">JSON</text>

  <!-- === STAGE 3: Analysis === -->
  <rect x="600" y="90" width="180" height="160" rx="4" fill="#111922" stroke="#1b1b3a" stroke-width="1"/>
  <rect x="600" y="90" width="180" height="22" rx="4" fill="#1a1525"/>
  <rect x="600" y="108" width="180" height="4" fill="#1a1525"/>
  <text x="690" y="105" text-anchor="middle" fill="#b39ddb" font-size="8" font-weight="700" letter-spacing="1">STAGE 3</text>

  <text x="690" y="132" text-anchor="middle" fill="#e0e0e0" font-size="10" font-weight="600">Depth + Segmentation</text>

  <!-- Sub-components -->
  <rect x="610" y="142" width="78" height="36" rx="3" fill="#14142a" stroke="#2a2a4a" stroke-width="0.8"/>
  <text x="649" y="157" text-anchor="middle" fill="#b39ddb" font-size="7" font-weight="600">Depth Pro</text>
  <text x="649" y="170" text-anchor="middle" fill="#546e7a" font-size="6">Apple · Monocular</text>

  <rect x="694" y="142" width="78" height="36" rx="3" fill="#14142a" stroke="#2a2a4a" stroke-width="0.8"/>
  <text x="733" y="157" text-anchor="middle" fill="#b39ddb" font-size="7" font-weight="600">FastSAM</text>
  <text x="733" y="170" text-anchor="middle" fill="#546e7a" font-size="6">NanoSAM proxy</text>

  <text x="690" y="200" text-anchor="middle" fill="#546e7a" font-size="7">Depth per object: μ · σ · min · max</text>
  <text x="690" y="216" text-anchor="middle" fill="#546e7a" font-size="7">Segmentation masks · mask area</text>
  <text x="690" y="236" text-anchor="middle" fill="#b39ddb" font-size="7">→ analysis.json + visualizations</text>

  <!-- === OUTPUTS === -->
  <!-- Down arrows to outputs -->
  <line x1="250" y1="230" x2="250" y2="275" stroke="#37474f" stroke-width="0.8" stroke-dasharray="2,3"/>
  <line x1="250" y1="275" x2="250" y2="290" stroke="#455a64" stroke-width="0.8" marker-end="url(#arrow)"/>

  <line x1="470" y1="230" x2="470" y2="275" stroke="#37474f" stroke-width="0.8" stroke-dasharray="2,3"/>
  <line x1="470" y1="275" x2="470" y2="290" stroke="#455a64" stroke-width="0.8" marker-end="url(#arrow)"/>

  <line x1="690" y1="250" x2="690" y2="290" stroke="#455a64" stroke-width="0.8" marker-end="url(#arrow)"/>

  <!-- Output boxes -->
  <rect x="200" y="292" width="100" height="34" rx="3" fill="#131820" stroke="#1b3a4a" stroke-width="0.8"/>
  <text x="250" y="307" text-anchor="middle" fill="#4fc3f7" font-size="7" font-weight="600">RGB Frames</text>
  <text x="250" y="320" text-anchor="middle" fill="#546e7a" font-size="6">26 JPEG + metadata</text>

  <rect x="420" y="292" width="100" height="34" rx="3" fill="#131820" stroke="#1b3a2a" stroke-width="0.8"/>
  <text x="470" y="307" text-anchor="middle" fill="#81c784" font-size="7" font-weight="600">Detections</text>
  <text x="470" y="320" text-anchor="middle" fill="#546e7a" font-size="6">340 bboxes · 31 classes</text>

  <rect x="640" y="292" width="100" height="34" rx="3" fill="#131820" stroke="#1b1b3a" stroke-width="0.8"/>
  <text x="690" y="307" text-anchor="middle" fill="#b39ddb" font-size="7" font-weight="600">Analysis</text>
  <text x="690" y="320" text-anchor="middle" fill="#546e7a" font-size="6">per‑object depth + masks</text>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="600" letter-spacing="0.5">Habitat Spatial Reasoning Pipeline</text>
  <text x="400" y="58" text-anchor="middle" fill="#546e7a" font-size="9">3‑stage egocentric perception on HM3D photorealistic scenes</text>
</svg>
