<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" font-family="'Computer Modern', 'Latin Modern Roman', 'CMU Serif', Georgia, serif">
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#999"/>
    </marker>
  </defs>

  <rect width="720" height="240" fill="#faf8f5"/>

  <!-- Stage 1 -->
  <rect x="30" y="60" width="170" height="80" fill="none" stroke="#333" stroke-width="0.8"/>
  <text x="115" y="82" text-anchor="middle" font-size="11">Trajectory Collection</text>
  <text x="115" y="100" text-anchor="middle" font-size="9" fill="#555">habitat-sim 0.3.3</text>
  <text x="115" y="116" text-anchor="middle" font-size="8" fill="#888">navmesh waypoints</text>
  <text x="115" y="130" text-anchor="middle" font-size="8" fill="#888">26 frames · 640×480</text>

  <line x1="200" y1="100" x2="238" y2="100" stroke="#999" stroke-width="0.7" marker-end="url(#arrow)"/>

  <!-- Stage 2 -->
  <rect x="240" y="60" width="170" height="80" fill="none" stroke="#333" stroke-width="0.8"/>
  <text x="325" y="82" text-anchor="middle" font-size="11">Object Detection</text>
  <text x="325" y="100" text-anchor="middle" font-size="9" fill="#555">YOLO-World v2</text>
  <text x="325" y="116" text-anchor="middle" font-size="8" fill="#888">41 classes · open-vocabulary</text>
  <text x="325" y="130" text-anchor="middle" font-size="8" fill="#888">340 detections · 31 unique</text>

  <line x1="410" y1="100" x2="448" y2="100" stroke="#999" stroke-width="0.7" marker-end="url(#arrow)"/>

  <!-- Stage 3 -->
  <rect x="450" y="60" width="170" height="80" fill="none" stroke="#333" stroke-width="0.8"/>
  <text x="535" y="82" text-anchor="middle" font-size="11">Depth + Segmentation</text>
  <text x="535" y="100" text-anchor="middle" font-size="9" fill="#555">Depth Pro · FastSAM</text>
  <text x="535" y="116" text-anchor="middle" font-size="8" fill="#888">per-pixel metric depth</text>
  <text x="535" y="130" text-anchor="middle" font-size="8" fill="#888">per-object masks + stats</text>

  <!-- Input label -->
  <text x="115" y="52" text-anchor="middle" font-size="8" fill="#888">HM3D 00800-TEEsavR23oF</text>
  <line x1="115" y1="55" x2="115" y2="58" stroke="#ccc" stroke-width="0.5"/>

  <!-- Output labels -->
  <line x1="115" y1="140" x2="115" y2="168" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="115" y="180" text-anchor="middle" font-size="8" fill="#888">26 JPEG frames</text>

  <line x1="325" y1="140" x2="325" y2="168" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="325" y="180" text-anchor="middle" font-size="8" fill="#888">detections.json</text>

  <line x1="535" y1="140" x2="535" y2="168" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="535" y="180" text-anchor="middle" font-size="8" fill="#888">analysis.json</text>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" font-size="13" fill="#222">Habitat Spatial Reasoning Pipeline</text>

  <!-- Caption -->
  <text x="360" y="222" text-anchor="middle" font-size="8.5" fill="#666" font-style="italic">Figure 1: Three-stage pipeline architecture. Each stage reads and writes standard JPEG/JSON artifacts, enabling independent execution and model substitution.</text>
</svg>
