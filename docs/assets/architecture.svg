<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" style="background:#0d1117;font-family:system-ui,-apple-system,sans-serif">
  <defs>
    <marker id="a" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#484f58"/>
    </marker>
  </defs>

  <!-- Process blocks -->
  <rect x="24" y="100" width="180" height="96" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="114" y="124" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="500">Trajectory Collection</text>
  <text x="114" y="144" text-anchor="middle" fill="#8b949e" font-size="9">habitat-sim 0.3.3</text>
  <text x="114" y="162" text-anchor="middle" fill="#484f58" font-size="8">Navmesh waypoints</text>
  <text x="114" y="176" text-anchor="middle" fill="#484f58" font-size="8">1.5m eye height · 640×480</text>
  <text x="114" y="190" text-anchor="middle" fill="#484f58" font-size="8">26 frames · 90° HFOV</text>

  <line x1="204" y1="148" x2="246" y2="148" stroke="#30363d" stroke-width="1" marker-end="url(#a)"/>

  <rect x="248" y="100" width="180" height="96" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="338" y="124" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="500">Object Detection</text>
  <text x="338" y="144" text-anchor="middle" fill="#8b949e" font-size="9">YOLO-World v2</text>
  <text x="338" y="162" text-anchor="middle" fill="#484f58" font-size="8">Open-vocabulary · 41 classes</text>
  <text x="338" y="176" text-anchor="middle" fill="#484f58" font-size="8">CLIP text encoder</text>
  <text x="338" y="190" text-anchor="middle" fill="#484f58" font-size="8">340 detections · 31 classes</text>

  <line x1="428" y1="148" x2="470" y2="148" stroke="#30363d" stroke-width="1" marker-end="url(#a)"/>

  <rect x="472" y="88" width="180" height="120" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="562" y="112" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="500">Depth + Segmentation</text>

  <rect x="484" y="126" width="72" height="32" fill="#0d1117" stroke="#21262d" stroke-width="0.5"/>
  <text x="520" y="140" text-anchor="middle" fill="#8b949e" font-size="8">Depth Pro</text>
  <text x="520" y="152" text-anchor="middle" fill="#484f58" font-size="7">Apple · metric</text>

  <rect x="566" y="126" width="72" height="32" fill="#0d1117" stroke="#21262d" stroke-width="0.5"/>
  <text x="602" y="140" text-anchor="middle" fill="#8b949e" font-size="8">FastSAM</text>
  <text x="602" y="152" text-anchor="middle" fill="#484f58" font-size="7">segmentation</text>

  <text x="562" y="182" text-anchor="middle" fill="#484f58" font-size="8">Pixel-level depth · per-object masks</text>
  <text x="562" y="196" text-anchor="middle" fill="#484f58" font-size="8">μ · σ · min · max · mask area</text>

  <!-- Scene input -->
  <rect x="24" y="56" width="180" height="28" fill="#0d1117" stroke="#21262d" stroke-width="0.5"/>
  <text x="114" y="74" text-anchor="middle" fill="#8b949e" font-size="9">HM3D 00800-TEEsavR23oF</text>

  <line x1="114" y1="84" x2="114" y2="98" stroke="#21262d" stroke-width="0.5"/>

  <!-- Output artifacts -->
  <rect x="60" y="232" width="108" height="24" rx="3" fill="#0d1117" stroke="#21262d" stroke-width="0.5"/>
  <text x="114" y="247" text-anchor="middle" fill="#484f58" font-size="8">26 JPEG frames</text>

  <rect x="284" y="232" width="108" height="24" rx="3" fill="#0d1117" stroke="#21262d" stroke-width="0.5"/>
  <text x="338" y="247" text-anchor="middle" fill="#484f58" font-size="8">detections.json</text>

  <rect x="508" y="244" width="108" height="24" rx="3" fill="#0d1117" stroke="#21262d" stroke-width="0.5"/>
  <text x="562" y="259" text-anchor="middle" fill="#484f58" font-size="8">analysis.json</text>

  <!-- Dashed lines to outputs -->
  <line x1="114" y1="196" x2="114" y2="230" stroke="#21262d" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="338" y1="196" x2="338" y2="230" stroke="#21262d" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="562" y1="208" x2="562" y2="242" stroke="#21262d" stroke-width="0.5" stroke-dasharray="2,3"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="600">Habitat Spatial Reasoning Pipeline</text>
</svg>
